[ADDRESS]
172.21.1.155=nginx,eureka-server,new-api-gateway,auth-server,param-center
172.21.1.156=eureka-server,new-api-gateway,auth-server,param-center
172.21.1.157=redis

[redis]
dir=/opt/app/redis-5.0.10/src
start=./redis-server /opt/redis-5.0.10/redis.conf
stop=./redis-cli -a 123!@#qwe --no-auth-warning shutdown
port=6379

[nginx]
dir=/opt/app/microservice/nginx/sbin
start=./nginx
stop=./nginx -s stop
port=8088

[eureka-server]
dir=/opt/app/microservice/eureka-server
start=./eureka-server.sh start
stop=./eureka-server.sh stop
port=1111
before_start_check_net=172.21.1.145:5432,172.21.1.145:6379,172.21.1.147:80

[new-api-gateway]
dir=/opt/app/microservice/new-api-gateway
start=./new-api-gateway.sh start
stop=./new-api-gateway.sh stop
port=9000
before_start_check_net=172.21.1.145:5238,172.21.1.145:6379,172.21.1.147:8088

[auth-server]
dir=/opt/app/microservice/auth-server
start=./auth-server.sh start
stop=./auth-server.sh stop
port=8001
before_start_check_http=http://www.micro.net/actuator/gateway/routes/api-eureka

[param-center]
dir=/opt/app/microservice/param-center
start=./param-center.sh start
stop=./param-center.sh stop
port=7002
before_start_check_http=http://www.micro.net/actuator/gateway/routes/api-eureka
